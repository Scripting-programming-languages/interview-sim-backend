security:
  jwt:
    secret-key: ${JWT_SECRET_KEY}
    access-token-expiration: ${ACCESS_TOKEN_EXPIRATION}
    refresh-token-expiration: ${REFRESH_TOKEN_EXPIRATION}
  admin:
    username: ${ADMIN_USERNAME}
    password: ${ADMIN_PASSWORD}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

http:
  common:
    maxConnectionTotal: 100
    maxConnectionPerRoute: 30
  ml:
    baseUrl: ${ML_URL}
    connectTimeout: 5000 # 5 sec
    readTimeout: 120000 # 2 min

kafka:
  ml:
    topics: ${ML_KAFKA_TOPIC}
    groupId: ${ML_KAFKA_GROUP_ID}
    concurrency: ${ML_KAFKA_CONCURRENCY}

spring:
  profiles:
    active: ${SPRING_PROFILE_NAME:dev}
  application:
    name: interview-sim-backend
  liquibase:
    enabled: true
    change-log: classpath:migrations/changelog.yml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: ${ML_KAFKA_GROUP_ID}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
        spring.json.value.default.type: "com.github.scripting.programming.language.interview_sim_backend.dto.AnswerEstimationMsg"
        spring.json.trusted.packages: "com.github.scripting.programming.language.interview_sim_backend.dto"
  grpc:
    server:
      port: 9090
      grpc-web:
        enabled: true
      cors:
        allowed-origins: ${CORS_ALLOWED_ORIGINS}
        allowed-methods: "POST, OPTIONS"
        allowed-headers: "Content-Type, x-grpc-web, x-user-agent"
        max-age: 3600
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: HikariPool-InterviewSim
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000 # Как долго соединение может висеть без дела перед удалением (5 минут)
      max-lifetime: 600000  # Максимальное время жизни соединения (10 минут)
      # Сколько ждать получения соединения из пула перед броском исключения (30 секунд)
      connection-timeout: 30000
      validation-timeout: 3000 # Время на проверку того, что соединение живо
      leak-detection-threshold: 5000 # Порог для обнаружения утечки соединения
      register-mbeans: false
      auto-commit: false
    jpa:
      open-in-view: false
      show-sql: false
      hibernate:
        ddl-auto: validate
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
          jdbc.batch_size: 25
          order_inserts: true
          order_updates: true
          format_sql: true